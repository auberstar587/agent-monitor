<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent 管理 - Agent Monitor</title>
    <link rel="stylesheet" href="css/agent.css">
</head>
<body>
    <!-- 顶部导航 -->
    <nav class="top-nav">
        <div class="nav-brand">
            <span class="logo">🤖</span>
            <span class="title">Agent Monitor</span>
        </div>
        <div class="nav-links">
            <a href="index.html" class="nav-link">总览</a>
            <a href="agent.html" class="nav-link active">Agent</a>
            <a href="project.html" class="nav-link">项目</a>
            <a href="meeting.html" class="nav-link">会议</a>
        </div>
        <div class="nav-status">
            <span class="status-indicator online"></span>
            <span class="status-text">系统正常</span>
        </div>
    </nav>

    <div class="main-container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-section">
                <h3 class="sidebar-title">系统资源</h3>
                <div class="resource-item">
                    <div class="resource-header">
                        <span class="resource-label">CPU</span>
                        <span class="resource-value" id="cpu-value">--</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill cpu" id="cpu-bar" style="width: 0%"></div>
                    </div>
                </div>
                <div class="resource-item">
                    <div class="resource-header">
                        <span class="resource-label">内存</span>
                        <span class="resource-value" id="memory-value">--</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill memory" id="memory-bar" style="width: 0%"></div>
                    </div>
                </div>
                <div class="resource-item">
                    <div class="resource-header">
                        <span class="resource-label">磁盘</span>
                        <span class="resource-value" id="disk-value">--</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill disk" id="disk-bar" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <div class="sidebar-section">
                <h3 class="sidebar-title">系统信息</h3>
                <div class="system-info">
                    <div class="info-row">
                        <span class="info-label">版本</span>
                        <span class="info-value" id="sys-version">v1.0.0</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">启动时间</span>
                        <span class="info-value" id="sys-startup">--</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">运行时长</span>
                        <span class="info-value" id="sys-uptime">--</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">操作系统</span>
                        <span class="info-value" id="sys-os">--</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="content">
            <!-- KPI 卡片 -->
            <div class="kpi-grid">
                <div class="kpi-card">
                    <div class="kpi-icon">🤖</div>
                    <div class="kpi-info">
                        <div class="kpi-value" id="kpi-total">0</div>
                        <div class="kpi-label">Agent 总数</div>
                    </div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon running">★</div>
                    <div class="kpi-info">
                        <div class="kpi-value" id="kpi-running">0</div>
                        <div class="kpi-label">默认 Agent</div>
                    </div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon idle">⚙️</div>
                    <div class="kpi-info">
                        <div class="kpi-value" id="kpi-idle">0</div>
                        <div class="kpi-label">有 Skills</div>
                    </div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon away">○</div>
                    <div class="kpi-info">
                        <div class="kpi-value" id="kpi-away">0</div>
                        <div class="kpi-label">无 Skills</div>
                    </div>
                </div>
            </div>

            <!-- 工具栏 -->
            <div class="toolbar">
                <div class="toolbar-left">
                    <input type="text" class="search-input" placeholder="搜索 Agent..." id="search-input">
                </div>
                <div class="toolbar-right">
                    <select class="filter-select" id="status-filter">
                        <option value="all">全部状态</option>
                        <option value="idle">空闲</option>
                        <option value="working">工作中</option>
                        <option value="meeting">会议中</option>
                        <option value="offline">离线</option>
                    </select>
                    <button class="btn btn-primary" id="btn-refresh">
                        <span>🔄</span> 刷新
                    </button>
                </div>
            </div>

            <!-- Agent 列表 -->
            <div class="agent-table-container">
                <table class="agent-table">
                    <thead>
                        <tr>
                            <th>名称</th>
                            <th>状态</th>
                            <th>主模型</th>
                            <th>Fallbacks</th>
                            <th>Skills</th>
                            <th>默认</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="agent-tbody">
                        <!-- 动态填充 -->
                    </tbody>
                </table>
            </div>

            <!-- 分页 -->
            <div class="pagination">
                <span class="pagination-info" id="pagination-info">显示 0-0 共 0 条</span>
                <div class="pagination-controls">
                    <button class="btn btn-small" id="btn-prev" disabled>上一页</button>
                    <button class="btn btn-small" id="btn-next" disabled>下一页</button>
                </div>
            </div>
        </main>
    </div>

    <!-- Agent 详情弹窗 -->
    <div class="modal" id="agent-modal">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Agent 详情</h3>
                <button class="modal-close" id="modal-close">×</button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- 动态填充 -->
            </div>
        </div>
    </div>

    <script src="js/agent.js"></script>
</body>
</html>
