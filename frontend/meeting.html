<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Meeting - 开会可视化</title>
    <link rel="stylesheet" href="css/meeting.css">
</head>
<body>
    <!-- 顶部状态栏 -->
    <header id="top-bar">
        <div class="meeting-status">
            <span class="status-dot"></span>
            <span class="status-text">会议进行中</span>
            <span class="meeting-duration" id="duration">00:00:00</span>
        </div>
        <div class="top-actions">
            <button class="btn-icon" id="btn-fullscreen" title="全屏">⛶</button>
            <button class="btn-icon" id="btn-settings" title="设置">⚙</button>
        </div>
    </header>

    <!-- 主内容区 -->
    <main id="main-content">
        <!-- 左侧：会议室场景 -->
        <section id="meeting-scene">
            <!-- 背景图（AI生成的会议室） -->
            <div id="scene-background">
                <!-- 后续用生成的背景图替换 -->
            </div>

            <!-- 角色区域 -->
            <div id="characters-container">
                <!-- 5个角色的气泡和位置由 JS 动态生成 -->
            </div>

            <!-- 会议信息卡片 -->
            <div id="meeting-info">
                <h2 id="meeting-topic">新产品方案讨论</h2>
                <p id="meeting-goal">目标：确定 MVP 版本范围</p>
            </div>

            <!-- 气泡层 -->
            <div id="bubbles-container">
                <!-- 气泡由 JS 动态生成 -->
            </div>
        </section>

        <!-- 右侧：聊天记录 -->
        <aside id="chat-sidebar">
            <!-- 标签筛选 -->
            <div class="chat-tabs">
                <button class="tab active" data-filter="all">全部</button>
                <button class="tab" data-filter="orchestrator">主持</button>
                <button class="tab" data-filter="product">产品</button>
                <button class="tab" data-filter="tech">技术</button>
                <button class="tab" data-filter="data">数据</button>
                <button class="tab" data-filter="ux">体验</button>
            </div>

            <!-- 消息列表 -->
            <div id="chat-messages">
                <!-- 消息由 JS 动态生成 -->
            </div>

            <!-- 输入区 -->
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="输入消息或使用 / 指令...">
                <button class="btn-send">发送</button>
            </div>
        </aside>
    </main>

    <!-- 底部控制栏 -->
    <footer id="control-bar">
        <div class="participants">
            <span class="participant-count">5/5</span>
            <div class="participant-avatars">
                <!-- 5个小圆点表示参与者 -->
            </div>
        </div>
        <div class="control-buttons">
            <button class="btn-control active" title="麦克风">🎤</button>
            <button class="btn-control active" title="摄像头">📷</button>
            <button class="btn-control" title="屏幕共享">🖥️</button>
            <button class="btn-control" title="会议纪要">📝</button>
            <button class="btn-control" title="更多">•••</button>
        </div>
        <button class="btn-end-meeting" id="btn-end">结束会议</button>
    </footer>

    <script src="js/meeting.js"></script>
</body>
</html>
