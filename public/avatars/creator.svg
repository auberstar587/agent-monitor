<!-- creator: 创作者 - 创造蓝 #4A9EFF -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="100" height="120" class="agent-avatar" data-agent="creator">
  <defs>
    <!-- 灯泡光效 -->
    <radialGradient id="creator-bulb-glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#4A9EFF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4A9EFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="creator-glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 粒子光环 -->
  <g class="halo-particles">
    <circle cx="50" cy="12" r="3" fill="#FFD700" opacity="0.7" class="particle p1"/>
    <circle cx="30" cy="20" r="2" fill="#FFD700" opacity="0.5" class="particle p2"/>
    <circle cx="70" cy="18" r="2.5" fill="#FFD700" opacity="0.6" class="particle p3"/>
    <circle cx="25" cy="32" r="1.5" fill="#4A9EFF" opacity="0.4" class="particle p4"/>
    <circle cx="75" cy="30" r="1.5" fill="#4A9EFF" opacity="0.4" class="particle p5"/>
  </g>

  <!-- 头部 (圆角方形) -->
  <rect x="28" y="20" width="44" height="40" rx="8" fill="#F5F5F5" stroke="#4A9EFF" stroke-width="2.5"/>

  <!-- 灯泡眼睛 -->
  <g class="bulb-eyes" filter="url(#creator-glow)">
    <!-- 左眼 -->
    <ellipse cx="40" cy="36" rx="6" ry="7" fill="#4A9EFF"/>
    <ellipse cx="40" cy="34" rx="4" ry="4" fill="#FFD700" opacity="0.8" class="bulb-glow"/>
    <rect x="37" y="42" width="6" height="4" rx="1" fill="#4A9EFF"/>
    <!-- 右眼 -->
    <ellipse cx="60" cy="36" rx="6" ry="7" fill="#4A9EFF"/>
    <ellipse cx="60" cy="34" rx="4" ry="4" fill="#FFD700" opacity="0.8" class="bulb-glow"/>
    <rect x="57" y="42" width="6" height="4" rx="1" fill="#4A9EFF"/>
  </g>

  <!-- 身体 (矩形) -->
  <rect x="30" y="62" width="40" height="40" rx="4" fill="#F5F5F5" stroke="#4A9EFF" stroke-width="2.5"/>

  <!-- 领口 -->
  <path d="M42 62 L50 72 L58 62" fill="none" stroke="#4A9EFF" stroke-width="2" stroke-linejoin="round"/>

  <!-- 画笔 (右手) -->
  <g class="paint-brush">
    <line x1="70" y1="75" x2="82" y2="65" stroke="#4A9EFF" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="83" cy="64" r="3" fill="#FFD700"/>
  </g>

  <!-- 胸前装饰 -->
  <rect x="44" y="76" width="12" height="18" rx="2" fill="#4A9EFF" opacity="0.3"/>
  <line x1="47" y1="80" x2="53" y2="80" stroke="#4A9EFF" stroke-width="1.5" opacity="0.7"/>
  <line x1="47" y1="84" x2="53" y2="84" stroke="#4A9EFF" stroke-width="1.5" opacity="0.7"/>
  <line x1="47" y1="88" x2="51" y2="88" stroke="#4A9EFF" stroke-width="1.5" opacity="0.7"/>
</svg>
