<!-- canmou: 监听者 - 科技绿 #00D9A5 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="100" height="120" class="agent-avatar" data-agent="canmou">
  <defs>
    <!-- 眼睛扫描光效 -->
    <radialGradient id="canmou-eye-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00FFB3" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00D9A5" stop-opacity="0"/>
    </radialGradient>
    <!-- 天线光晕 -->
    <filter id="canmou-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 天线 -->
  <g class="antenna" filter="url(#canmou-glow)">
    <line x1="50" y1="22" x2="50" y2="8" stroke="#00D9A5" stroke-width="2" stroke-linecap="round"/>
    <circle cx="50" cy="6" r="4" fill="#00FFB3" class="antenna-tip"/>
  </g>

  <!-- 头部 -->
  <circle cx="50" cy="35" r="22" fill="#1A1A2E" stroke="#00D9A5" stroke-width="2.5"/>

  <!-- 眼睛 (扫描雷达) -->
  <g class="eye-group">
    <circle cx="50" cy="35" r="10" fill="#0a0a14"/>
    <circle cx="50" cy="35" r="6" fill="#00D9A5" class="eye-core"/>
    <!-- 扫描弧线 -->
    <g class="scan-arc">
      <circle cx="50" cy="35" r="10" fill="none" stroke="#00FFB3" stroke-width="1.5"
              stroke-dasharray="8 6" stroke-dashoffset="0" class="scan-ring"/>
      <line x1="50" y1="35" x2="50" y2="25" stroke="#00FFB3" stroke-width="1.5"
            stroke-linecap="round" class="scan-line"/>
    </g>
  </g>

  <!-- 身体 (三角形) -->
  <polygon points="50,60 28,105 72,105" fill="#1A1A2E" stroke="#00D9A5" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- 胸前光纹 -->
  <line x1="50" y1="68" x2="50" y2="88" stroke="#00D9A5" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <circle cx="50" cy="92" r="3" fill="#00FFB3" opacity="0.8"/>

  <!-- 雷达波纹 (两侧) -->
  <g class="radar-waves" opacity="0.5">
    <circle cx="20" cy="45" r="5" fill="none" stroke="#00D9A5" stroke-width="1" class="wave wave-1"/>
    <circle cx="80" cy="45" r="5" fill="none" stroke="#00D9A5" stroke-width="1" class="wave wave-2"/>
  </g>
</svg>
