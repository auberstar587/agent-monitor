<!-- evolver: 进化者 - 进化紫 #A855F7 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="100" height="120" class="agent-avatar" data-agent="evolver">
  <defs>
    <!-- 进化光环渐变 -->
    <linearGradient id="evolver-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <radialGradient id="evolver-core-glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#EC4899" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>
    <filter id="evolver-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 进化光环 (多层圆环) -->
  <g class="evolution-halo" filter="url(#evolver-glow)">
    <ellipse cx="50" cy="18" rx="28" ry="6" fill="none" stroke="#A855F7" stroke-width="2" opacity="0.4" class="halo-ring ring-1"/>
    <ellipse cx="50" cy="18" rx="22" ry="5" fill="none" stroke="#EC4899" stroke-width="1.5" opacity="0.5" class="halo-ring ring-2"/>
    <ellipse cx="50" cy="18" rx="16" ry="4" fill="none" stroke="#A855F7" stroke-width="1" opacity="0.6" class="halo-ring ring-3"/>
  </g>

  <!-- 头部 (水滴形) -->
  <path d="M50 10 C65 10 72 25 72 38 C72 52 62 58 50 58 C38 58 28 52 28 38 C28 25 35 10 50 10 Z"
        fill="#7C3AED" stroke="#A855F7" stroke-width="2.5"/>

  <!-- 核心光效 -->
  <ellipse cx="50" cy="34" rx="12" ry="10" fill="url(#evolver-core-glow)"/>

  <!-- 进化之眼 -->
  <g class="evo-eye">
    <ellipse cx="50" cy="34" rx="8" ry="7" fill="#1A1A2E"/>
    <ellipse cx="50" cy="34" rx="5" ry="4" fill="#A855F7" class="evo-pupil"/>
    <ellipse cx="50" cy="33" rx="2" ry="1.5" fill="#EC4899"/>
  </g>

  <!-- 身体 (流动变形) -->
  <path d="M35 60 Q25 75 30 105 L70 105 Q75 75 65 60 Q58 56 50 58 Q42 56 35 60 Z"
        fill="#7C3AED" stroke="#A855F7" stroke-width="2.5" class="evo-body"/>

  <!-- 代码流线条 -->
  <g class="code-stream" opacity="0.6">
    <line x1="32" y1="68" x2="32" y2="95" stroke="#A855F7" stroke-width="1.5"
          stroke-dasharray="4 4" class="stream-line sl-1"/>
    <line x1="68" y1="68" x2="68" y2="95" stroke="#A855F7" stroke-width="1.5"
          stroke-dasharray="4 4" class="stream-line sl-2"/>
    <line x1="50" y1="65" x2="50" y2="100" stroke="#EC4899" stroke-width="1"
          stroke-dasharray="3 5" class="stream-line sl-3"/>
  </g>

  <!-- 底部能量波 -->
  <path d="M35 105 Q50 110 65 105" fill="none" stroke="#EC4899" stroke-width="2" opacity="0.5" class="energy-wave"/>
</svg>
