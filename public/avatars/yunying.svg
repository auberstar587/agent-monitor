<!-- yunying: 运营者 - 活力橙 #FF9F43 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="100" height="120" class="agent-avatar" data-agent="yunying">
  <defs>
    <filter id="yunying-glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 头部 (椭圆) -->
  <ellipse cx="50" cy="32" rx="22" ry="20" fill="#2D3436" stroke="#FF9F43" stroke-width="2.5"/>

  <!-- 仪表盘眼睛 -->
  <g class="dashboard-eyes">
    <!-- 左眼仪表盘 -->
    <rect x="35" y="26" width="10" height="10" rx="2" fill="#FF9F43"/>
    <line x1="40" y1="31" x2="43" y2="29" stroke="#2D3436" stroke-width="1.5" stroke-linecap="round" class="needle needle-l"/>
    <circle cx="40" cy="31" r="1.5" fill="#FFD700"/>
    <!-- 右眼仪表盘 -->
    <rect x="55" y="26" width="10" height="10" rx="2" fill="#FF9F43"/>
    <line x1="60" y1="31" x2="57" y2="29" stroke="#2D3436" stroke-width="1.5" stroke-linecap="round" class="needle needle-r"/>
    <circle cx="60" cy="31" r="1.5" fill="#FFD700"/>
  </g>

  <!-- 微笑嘴角 -->
  <path d="M44 42 Q50 46 56 42" fill="none" stroke="#FF9F43" stroke-width="2" stroke-linecap="round" class="mouth"/>

  <!-- 身体 (梯形) -->
  <path d="M32 55 L68 55 L72 105 L28 105 Z" fill="#2D3436" stroke="#FF9F43" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- 领结 -->
  <path d="M46 55 L50 60 L54 55 L50 52 Z" fill="#FF6B6B"/>
  <circle cx="50" cy="56" r="2" fill="#FFD700"/>

  <!-- 手中记事本 -->
  <g class="notepad">
    <rect x="18" y="72" width="16" height="22" rx="2" fill="#F5F5F5" stroke="#FF9F43" stroke-width="1.5"/>
    <line x1="21" y1="77" x2="31" y2="77" stroke="#FF9F43" stroke-width="1" opacity="0.6"/>
    <line x1="21" y1="81" x2="31" y2="81" stroke="#FF9F43" stroke-width="1" opacity="0.6"/>
    <line x1="21" y1="85" x2="28" y2="85" stroke="#FF9F43" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- 胸前数据条 -->
  <g class="data-bars" opacity="0.6">
    <rect x="56" y="70" width="6" height="20" rx="1" fill="#FF9F43" opacity="0.3"/>
    <rect x="56" y="70" width="6" height="8" rx="1" fill="#FF9F43" class="bar bar-1"/>
    <rect x="64" y="70" width="6" height="20" rx="1" fill="#FF9F43" opacity="0.3"/>
    <rect x="64" y="76" width="6" height="14" rx="1" fill="#FF9F43" class="bar bar-2"/>
  </g>
</svg>
