<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Avatar Demo</title>
  <link rel="stylesheet" href="./css/avatar.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #fff;
      padding: 40px;
      min-height: 100vh;
    }
    h1 { font-size: 1.5rem; margin-bottom: 8px; color: #e0e0e0; }
    p { color: #888; margin-bottom: 32px; font-size: 0.9rem; }
    
    .section { margin-bottom: 48px; }
    .section-title {
      font-size: 0.85rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 16px;
      border-bottom: 1px solid #222;
      padding-bottom: 8px;
    }

    /* 状态展示区 */
    .state-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
    }
    
    .avatar-card {
      background: #1a1a2e;
      border-radius: 12px;
      padding: 24px;
      text-align: center;
      border: 1px solid #2a2a3e;
    }
    
    .avatar-card h3 {
      font-size: 0.9rem;
      margin-top: 12px;
      color: #aaa;
    }
    
    .avatar-card .state-label {
      font-size: 0.75rem;
      color: #555;
      margin-top: 4px;
    }

    /* 单个Agent完整展示 */
    .agent-showcase {
      display: flex;
      gap: 32px;
      align-items: flex-start;
      flex-wrap: wrap;
    }
    
    .agent-panel {
      background: #1a1a2e;
      border-radius: 16px;
      padding: 32px;
      min-width: 280px;
    }
    
    .agent-panel h2 {
      font-size: 1.1rem;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid #2a2a3e;
    }
    
    .state-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }
    
    .state-btn {
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #222;
      color: #aaa;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .state-btn:hover {
      background: #333;
      color: #fff;
    }
    
    .state-btn.active {
      background: var(--btn-color, #4A9EFF);
      border-color: var(--btn-color, #4A9EFF);
      color: #fff;
    }

    /* 控制器样式 */
    .agent-controls {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid #2a2a3e;
    }
    
    .agent-controls label {
      display: block;
      font-size: 0.75rem;
      color: #666;
      margin-bottom: 8px;
    }
    
    .agent-controls input[type="range"] {
      width: 100%;
      accent-color: var(--agent-color, #4A9EFF);
    }
  </style>
</head>
<body>
  <h1>🤖 Agent Avatar System</h1>
  <p>人形形象 × 5种状态动画 · CSS性能优化版</p>

  <!-- 各Agent完整展示 + 状态切换 -->

          <line x1="50" y1="68" x2="50" y2="88" stroke="#00D9A5" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

            <line x1="32" y1="68" x2="32" y2="95" stroke="#A855F7" stroke-width="1.5" stroke-dasharray="4 4" class="stream-line sl-1"/>

  <script type="module">
    import { AvatarController, AvatarManager, autoRegisterAvatars } from '../src/avatar.js';

    // 初始化所有 Agent
    const manager = autoRegisterAvatars();
    
    // 设置所有默认 idle
    manager.list().forEach(id => manager.get(id).idle());

    // 按钮交互
    document.querySelectorAll('.agent-panel').forEach(panel => {
      const svg = panel.querySelector('svg');
      const agentType = svg.getAttribute('data-agent');
      const buttons = panel.querySelectorAll('.state-btn');
      
      // 找到对应的 controller
      const ctrl = manager.list()
        .map(id => manager.get(id))
        .find(c => c.agentType === agentType);
      
      if (!ctrl) return;
      
      buttons.forEach(btn => {
        btn.addEventListener('click', () => {
          const state = btn.getAttribute('data-state');
          
          // 更新按钮高亮
          buttons.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          
          // 设置状态
          if (state === 'moving') {
            ctrl.moveTo(50, 30, 600);
          } else if (state === 'in-meeting') {
            ctrl.enterMeeting(0, 0);
          } else {
            ctrl.setState(state);
          }
        });
      });
      
      // 默认 idle 按钮高亮
      panel.querySelector('[data-state="idle"]').classList.add('active');
    });

    console.log('[Avatar Demo] Initialized. Avatars:', manager.list());
  </script>
</body>
</html>
