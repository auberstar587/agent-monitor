<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Monitor</title>
  <link rel="stylesheet" href="bubble.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
    }

    /* ---- Layout Shell ---- */
    .shell {
      display: grid;
      grid-template-rows: auto 1fr;
      grid-template-columns: 280px 1fr;
      height: 100vh;
      max-width: 1600px;
      margin: 0 auto;
    }

    /* ---- Top Bar ---- */
    .topbar {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
    }
    .topbar-title {
      font-size: 18px;
      font-weight: 700;
      color: #58a6ff;
    }
    .topbar-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #8b949e;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #3fb950;
    }
    .status-dot.offline { background: #f87171; }

    /* ---- Sidebar ---- */
    .sidebar {
      background: #161b22;
      border-right: 1px solid #30363d;
      padding: 16px;
      overflow-y: auto;
    }
    .sidebar-section { margin-bottom: 24px; }
    .sidebar-heading {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #8b949e;
      margin-bottom: 10px;
    }

    /* Agent cards in sidebar */
    .agent-card {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: border-color 0.2s;
    }
    .agent-card.active { border-color: #3fb950; }
    .agent-card.working { border-color: #f59e0b; }
    .agent-card.meeting { border-color: #a371f7; }
    .agent-card-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: #fff;
      flex-shrink: 0;
    }
    .agent-card-info { flex: 1; min-width: 0; }
    .agent-card-name {
      font-size: 13px; font-weight: 600;
      color: #e6edf3;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .agent-card-state {
      font-size: 11px; color: #8b949e;
      display: flex; align-items: center; gap: 4px;
      margin-top: 2px;
    }
    .state-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #8b949e;
    }
    .state-dot.active { background: #3fb950; }
    .state-dot.working { background: #f59e0b; }
    .state-dot.meeting { background: #a371f7; }

    /* ---- Main Content ---- */
    .main-content {
      display: flex;
      flex-direction: column;
      padding: 0;
      overflow: hidden;
    }

    /* Bubble chat panel fills main area */
    #bubble-container {
      flex: 1;
      overflow: hidden;
    }

    /* ---- Placeholder ---- */
    .placeholder {
      text-align: center;
      padding: 60px 20px;
      color: #8b949e;
    }
    .placeholder-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
    .placeholder-text { font-size: 14px; }
  </style>
</head>
<body>
  <div class="shell">

    <!-- ===== Top Bar ===== -->
    <header class="topbar">
      <div class="topbar-title">🤖 Agent Monitor</div>
      <div class="topbar-status">
        <span class="status-dot" id="conn-dot"></span>
        <span id="conn-status">Connecting...</span>
      </div>
    </header>

    <!-- ===== Sidebar ===== -->
    <aside class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-heading">Agents</div>
        <div id="agents-list">
          <div class="placeholder" style="padding:20px 0;">Loading...</div>
        </div>
      </div>
    </aside>

    <!-- ===== Main: Bubble Chat ===== -->
    <main class="main-content">
      <div id="bubble-container"></div>
    </main>

  </div>

  <script src="https://cdn.socket.io/4.7.0/socket.io.min.js"></script>
  <script src="../src/bubble.js"></script>
  <script>
    // ---- Bubble Renderer Init ----
    const bubbleRenderer = new BubbleRenderer('#bubble-container', {
      maxVisible: 50,
      maxHistory: 200,
      floodThreshold: 5,
      floodWindowMs: 5000,
      floodPauseMs: 3000,
      renderThrottleMs: 200,
      collapseThreshold: 20,
      autoScroll: true
    });

    // ---- Socket.IO Connection ----
    const socket = io(); // 自动检测当前域名

    socket.on('connect', () => {
      document.getElementById('conn-dot').classList.remove('offline');
      document.getElementById('conn-status').textContent = 'Connected';
    });

    socket.on('disconnect', () => {
      document.getElementById('conn-dot').classList.add('offline');
      document.getElementById('conn-status').textContent = 'Disconnected';
    });

    // ---- State Events ----
    socket.on('state:init', (data) => {
      const agents = data.agents || data || [];
      bubbleRenderer.registerAgents(agents);
      renderAgentList(agents);
    });

    socket.on('state:update', (agent) => {
      bubbleRenderer.registerAgent(agent);
      updateAgentCard(agent);
    });

    // ---- Message Events ----
    socket.on('message:new', (msg) => {
      bubbleRenderer.pushMessage(normalizeMessage(msg));
    });

    socket.on('message:streaming', (msg) => {
      // Partial update for streaming messages
      bubbleRenderer.updateStreamingMessage(msg.id, {
        content: msg.content,
        status: 'streaming'
      });
    });

    socket.on('message:done', (msg) => {
      bubbleRenderer.updateStreamingMessage(msg.id, {
        content: msg.content,
        status: 'completed'
      });
    });

    socket.on('message:failed', (msg) => {
      bubbleRenderer.updateStreamingMessage(msg.id, {
        status: 'failed'
      });
    });

    // ---- Normalize incoming message format ----
    function normalizeMessage(msg) {
      // Map legacy agent IDs to roles
      const roleMap = {
        canmou: 'main',
        creator: 'host',
        yunying: 'support',
        evolver: 'observer',
        // also support explicit role names
        host: 'host',
        main: 'main',
        support: 'support',
        observer: 'observer',
        system: 'system',
        user: 'user'
      };

      const agentId = msg.agentId || msg.agent_id || 'unknown';
      let role = msg.role || roleMap[agentId] || 'main';

      return {
        id: msg.id || `msg_${Date.now()}_${Math.random().toString(36).slice(2,7)}`,
        agentId: agentId,
        agentName: msg.agentName || msg.agent_name || getAgentDisplayName(agentId),
        role: role,
        content: msg.content || msg.text || '',
        contentType: msg.contentType || msg.content_type || 'text',
        timestamp: msg.timestamp || Date.now(),
        status: msg.status || 'completed',
        metadata: msg.metadata || {}
      };
    }

    function getAgentDisplayName(agentId) {
      const names = {
        canmou: '参谋',
        creator: '主持人',
        yunying: '运营',
        evolver: '进化者'
      };
      return names[agentId] || agentId;
    }

    // ---- Agent List (Sidebar) ----
    const agentColorMap = {
      host: '#6366F1',
      main: '#10B981',
      support: '#F59E0B',
      observer: '#6B7280',
      system: '#1F2937',
      user: '#3B82F6'
    };

    function renderAgentList(agents) {
      const container = document.getElementById('agents-list');
      if (!agents.length) {
        container.innerHTML = '<div class="placeholder" style="padding:20px 0">No agents</div>';
        return;
      }
      container.innerHTML = agents.map(a => `
        <div class="agent-card ${a.state || 'idle'}" id="sidebar-agent-${a.agentId}">
          <div class="agent-card-avatar" style="background:${agentColorMap[a.role] || '#6B7280'}">
            ${(a.name || a.agentId).charAt(0).toUpperCase()}
          </div>
          <div class="agent-card-info">
            <div class="agent-card-name">${a.name || a.agentId}</div>
            <div class="agent-card-state">
              <span class="state-dot ${a.state || 'idle'}"></span>
              <span>${a.state || 'idle'}</span>
            </div>
          </div>
        </div>
      `).join('');
    }

    function updateAgentCard(agent) {
      const id = `sidebar-agent-${agent.agentId}`;
      let card = document.getElementById(id);
      if (!card) {
        // Insert new card
        const container = document.getElementById('agents-list');
        if (container.querySelector('.placeholder')) {
          container.innerHTML = '';
        }
        const frag = document.createElement('div');
        frag.innerHTML = `
          <div class="agent-card ${agent.state || 'idle'}" id="${id}">
            <div class="agent-card-avatar" style="background:${agentColorMap[agent.role] || '#6B7280'}">
              ${(agent.name || agent.agentId).charAt(0).toUpperCase()}
            </div>
            <div class="agent-card-info">
              <div class="agent-card-name">${agent.name || agent.agentId}</div>
              <div class="agent-card-state">
                <span class="state-dot ${agent.state || 'idle'}"></span>
                <span>${agent.state || 'idle'}</span>
              </div>
            </div>
          </div>
        `;
        container.appendChild(frag.firstElementChild);
        card = document.getElementById(id);
        return;
      }
      card.className = `agent-card ${agent.state || 'idle'}`;
      card.querySelector('.state-dot').className = `state-dot ${agent.state || 'idle'}`;
      card.querySelector('.agent-card-state span:last-child').textContent = agent.state || 'idle';
    }
  </script>
</body>
</html>
