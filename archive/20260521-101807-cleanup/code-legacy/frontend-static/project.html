<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目管理 - Agent Monitor</title>
    <link rel="stylesheet" href="css/agent.css">
    <style>
        /* 项目页面特定样式 */
        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
        }

        .project-card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
            transition: all 0.2s;
        }

        .project-card:hover {
            border-color: var(--accent-blue);
            transform: translateY(-2px);
        }

        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .project-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .project-path {
            font-size: 12px;
            color: var(--text-muted);
            font-family: 'SF Mono', monospace;
        }

        .project-status {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .project-status.active {
            background: rgba(34, 197, 94, 0.15);
            color: var(--accent-green);
        }

        .project-status.inactive {
            background: rgba(100, 116, 139, 0.15);
            color: var(--text-muted);
        }

        .project-meta {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--glass-border);
        }

        .meta-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .meta-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .meta-value {
            font-size: 14px;
            font-weight: 500;
        }

        .project-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .stat-item {
            text-align: center;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--accent-blue);
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .project-actions {
            display: flex;
            gap: 8px;
        }

        .project-actions .btn {
            flex: 1;
            justify-content: center;
        }

        /* 项目详情弹窗 */
        .detail-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin: 16px 0;
        }

        .detail-stat {
            text-align: center;
            padding: 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
        }

        .detail-stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent-blue);
        }

        .detail-stat-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .detail-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-label {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .form-input, .form-select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 10px 12px;
            color: var(--text-primary);
            font-size: 14px;
        }

        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .form-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <nav class="top-nav">
        <div class="nav-brand">
            <span class="logo">🤖</span>
            <span class="title">Agent Monitor</span>
        </div>
        <div class="nav-links">
            <a href="index.html" class="nav-link">总览</a>
            <a href="agent.html" class="nav-link">Agent</a>
            <a href="project.html" class="nav-link active">项目</a>
            <a href="meeting.html" class="nav-link">会议</a>
        </div>
        <div class="nav-status">
            <span class="status-indicator online"></span>
            <span class="status-text">系统正常</span>
        </div>
    </nav>

    <div class="main-container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-section">
                <h3 class="sidebar-title">项目统计</h3>
                <div class="resource-item">
                    <div class="resource-header">
                        <span class="resource-label">项目总数</span>
                        <span class="resource-value" id="stat-total">0</span>
                    </div>
                </div>
                <div class="resource-item">
                    <div class="resource-header">
                        <span class="resource-label">运行中</span>
                        <span class="resource-value" id="stat-active" style="color: var(--accent-green)">0</span>
                    </div>
                </div>
                <div class="resource-item">
                    <div class="resource-header">
                        <span class="resource-label">已停止</span>
                        <span class="resource-value" id="stat-inactive" style="color: var(--text-muted)">0</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="content">
            <!-- 工具栏 -->
            <div class="toolbar">
                <div class="toolbar-left">
                    <input type="text" class="search-input" placeholder="搜索项目..." id="search-input">
                </div>
                <div class="toolbar-right">
                    <select class="filter-select" id="status-filter">
                        <option value="all">全部状态</option>
                        <option value="active">运行中</option>
                        <option value="inactive">已停止</option>
                    </select>
                    <select class="filter-select" id="type-filter">
                        <option value="all">全部类型</option>
                        <option value="chat">对话型</option>
                        <option value="tool">工具型</option>
                        <option value="coding">编程型</option>
                        <option value="research">调研型</option>
                        <option value="creative">创作型</option>
                    </select>
                    <button class="btn btn-secondary" id="btn-import">
                        <span>🔍</span> 扫描导入
                    </button>
                    <button class="btn btn-primary" id="btn-add">
                        <span>+</span> 新建项目
                    </button>
                </div>
            </div>

            <!-- 项目列表 -->
            <div class="project-grid" id="project-grid">
                <!-- 动态填充 -->
            </div>

            <!-- 空状态 -->
            <div class="empty-state" id="empty-state" style="display: none;">
                <div style="text-align: center; padding: 60px 20px; color: var(--text-muted);">
                    <div style="font-size: 48px; margin-bottom: 16px;">📁</div>
                    <div style="font-size: 16px; margin-bottom: 8px;">暂无项目</div>
                    <div style="font-size: 14px;">点击「新建项目」创建一个新项目</div>
                </div>
            </div>
        </main>
    </div>

    <!-- 新建/编辑项目弹窗 -->
    <div class="modal" id="project-modal">
        <div class="modal-backdrop"></div>
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header">
                <h3 id="modal-title">新建项目</h3>
                <button class="modal-close" id="modal-close">×</button>
            </div>
            <div class="modal-body">
                <form class="detail-form" id="project-form">
                    <input type="hidden" id="project-id">
                    <div class="form-group">
                        <label class="form-label">项目名称</label>
                        <input type="text" class="form-input" id="project-name" placeholder="例如：知识助手" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">项目路径</label>
                        <input type="text" class="form-input" id="project-path" placeholder="例如：~/projects/knowledge-assistant">
                    </div>
                    <div class="form-group">
                        <label class="form-label">关联 Agent</label>
                        <select class="form-select" id="project-agent">
                            <option value="">-- 选择 Agent --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">项目类型</label>
                        <select class="form-select" id="project-type">
                            <option value="chat">对话型</option>
                            <option value="tool">工具型</option>
                            <option value="coding">编程型</option>
                            <option value="research">调研型</option>
                            <option value="creative">创作型</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">使用模型</label>
                        <select class="form-select" id="project-model">
                            <option value="qwen2.5">qwen2.5</option>
                            <option value="deepseek">deepseek</option>
                            <option value="gpt-4">gpt-4</option>
                            <option value="glm-4">glm-4</option>
                            <option value="glm-5.1">glm-5.1</option>
                            <option value="MiniMax-M2.7">MiniMax-M2.7</option>
                            <option value="GLM-4.7-Flash">GLM-4.7-Flash</option>
                        </select>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" id="btn-cancel">取消</button>
                        <button type="submit" class="btn btn-primary">保存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 项目详情弹窗 -->
    <div class="modal" id="detail-modal">
        <div class="modal-backdrop"></div>
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header">
                <h3 id="detail-title">项目详情</h3>
                <button class="modal-close" id="detail-close">×</button>
            </div>
            <div class="modal-body" id="detail-body">
                <!-- 动态填充 -->
            </div>
        </div>
    </div>

    <!-- 删除确认弹窗 -->
    <div class="modal" id="delete-modal">
        <div class="modal-backdrop"></div>
        <div class="modal-content" style="max-width: 400px;">
            <div class="modal-header">
                <h3>确认删除</h3>
                <button class="modal-close" id="delete-close">×</button>
            </div>
            <div class="modal-body">
                <p style="margin-bottom: 20px; color: var(--text-secondary);">
                    确定要删除项目「<span id="delete-project-name"></span>」吗？此操作不可撤销。
                </p>
                <div class="form-actions">
                    <button class="btn btn-secondary" id="btn-delete-cancel">取消</button>
                    <button class="btn btn-danger" id="btn-delete-confirm">删除</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/project.js"></script>
</body>
</html>
